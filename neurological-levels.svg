<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="700" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="350" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Neurological Levels — Concentric Model</text>
  <text x="350" y="68" text-anchor="middle" font-size="13" fill="#666">Based on Robert Dilts' Logical Levels of Change</text>
  
  <!-- Center point -->
  <!-- Circles from outside to inside -->
  
  <!-- Level 1: Environment (outermost) -->
  <circle cx="350" cy="380" r="290" fill="#e8f4f8" stroke="#4a90a4" stroke-width="2.5" opacity="0.9"/>
  <text x="350" y="115" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a90a4">🌍 Environment</text>
  <text x="350" y="133" text-anchor="middle" font-size="11" fill="#5a9aaa">Where &amp; When</text>
  
  <!-- Level 2: Behavior -->
  <circle cx="350" cy="380" r="235" fill="#e8f0e8" stroke="#5a9a6a" stroke-width="2.5" opacity="0.9"/>
  <text x="350" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a9a6a">🎯 Behavior</text>
  <text x="350" y="186" text-anchor="middle" font-size="11" fill="#6aaa7a">What you do</text>
  
  <!-- Level 3: Capabilities -->
  <circle cx="350" cy="380" r="185" fill="#f0eae0" stroke="#b08840" stroke-width="2.5" opacity="0.9"/>
  <text x="350" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#b08840">🛠️ Capabilities</text>
  <text x="350" y="236" text-anchor="middle" font-size="11" fill="#c09850">How you do it</text>
  
  <!-- Level 4: Values / Beliefs -->
  <circle cx="350" cy="380" r="140" fill="#f5e6e6" stroke="#c05050" stroke-width="2.5" opacity="0.9"/>
  <text x="350" y="262" text-anchor="middle" font-size="15" font-weight="bold" fill="#c05050">💡 Values / Beliefs</text>
  <text x="350" y="280" text-anchor="middle" font-size="11" fill="#d06060">Why it matters</text>
  
  <!-- Level 5: Identity -->
  <circle cx="350" cy="380" r="97" fill="#ece0f5" stroke="#8050a0" stroke-width="2.5" opacity="0.9"/>
  <text x="350" y="305" text-anchor="middle" font-size="15" font-weight="bold" fill="#8050a0">🪪 Identity</text>
  <text x="350" y="323" text-anchor="middle" font-size="11" fill="#9060b0">Who you are</text>
  
  <!-- Level 6: Soul (innermost) -->
  <circle cx="350" cy="380" r="58" fill="#fff8e0" stroke="#d4a020" stroke-width="3" opacity="0.95"/>
  <text x="350" y="373" text-anchor="middle" font-size="16" font-weight="bold" fill="#d4a020">🌟 Soul</text>
  <text x="350" y="393" text-anchor="middle" font-size="11" fill="#c49a20">First Principle</text>
  
  <!-- Right-side labels: OpenClaw files -->
  <line x1="590" y1="115" x2="640" y2="115" stroke="#4a90a4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="648" y="119" font-size="11" fill="#4a90a4" font-style="italic">machine, apps</text>
  
  <line x1="555" y1="175" x2="640" y2="175" stroke="#5a9a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="648" y="179" font-size="11" fill="#5a9a6a" font-style="italic">HEARTBEAT.md</text>
  
  <line x1="510" y1="230" x2="640" y2="230" stroke="#b08840" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="648" y="234" font-size="11" fill="#b08840" font-style="italic">AGENTS.md</text>
  
  <line x1="468" y1="280" x2="640" y2="280" stroke="#c05050" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="648" y="284" font-size="11" fill="#c05050" font-style="italic">SOUL.md</text>
  
  <line x1="430" y1="325" x2="640" y2="325" stroke="#8050a0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="648" y="329" font-size="11" fill="#8050a0" font-style="italic">IDENTITY.md</text>
  
  <line x1="400" y1="380" x2="640" y2="380" stroke="#d4a020" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="648" y="384" font-size="11" fill="#d4a020" font-style="italic">SOUL.md ✝️</text>
  
  <!-- Bottom note -->
  <text x="350" y="690" text-anchor="middle" font-size="12" fill="#999">Inner levels shape outer levels — start from the Soul, everything else follows.</text>
</svg>